name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call: # so metrics.yml can chain a deploy after its bot commit

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Branch tip, not github.sha: when called from metrics.yml on a
          # schedule, github.sha predates the metrics commit pushed in that run.
          ref: ${{ github.ref_name }}
      - uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
