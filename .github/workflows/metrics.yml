name: Update metrics

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: commit
        run: |
          if [ -n "$(git status --porcelain data/metrics)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/metrics
            git commit -m "chore: update repo metrics"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # Pushes made with the default GITHUB_TOKEN do not trigger `on: push`
  # workflows, so the bot commit above would never redeploy the site on its
  # own. Chain the deploy explicitly instead (no PAT needed).
  deploy:
    needs: update-metrics
    if: needs.update-metrics.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
